<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일학습병행 비용 계산기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: #4f46e5;
            cursor: pointer;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        /* Mobile Touch Optimizations */
        .touch-target { min-height: 44px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, Fragment } = React;

        // --- SVG 아이콘 컴포넌트 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                calculator: <path d="M16 3H8a5 5 0 0 0-5 5v8a5 5 0 0 0 5 5h8a5 5 0 0 0 5-5V8a5 5 0 0 0-5-5zM9 7h6M9 11h6M9 15h1M13 15h2" />,
                users: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />,
                clock: <Fragment><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></Fragment>,
                calendar: <Fragment><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></Fragment>,
                grad: <Fragment><path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c3 3 9 3 12 0v-5" /></Fragment>,
                check: <Fragment><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><polyline points="16 11 18 13 22 9" /></Fragment>,
                settings: <Fragment><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></Fragment>,
                trending: <Fragment><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></Fragment>,
                card: <Fragment><rect x="1" y="4" width="22" height="16" rx="2" ry="2" /><line x1="1" y1="10" x2="23" y2="10" /></Fragment>,
                success: <Fragment><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></Fragment>,
                info: <Fragment><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></Fragment>,
                alert: <Fragment><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></Fragment>,
                table: <Fragment><path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18" /></Fragment>,
                chevron: <polyline points="9 18 15 12 9 6" />,
                building: <Fragment><rect x="4" y="2" width="16" height="20" rx="2" ry="2" /><line x1="9" y1="22" x2="9" y2="7" /><line x1="15" y1="22" x2="15" y2="7" /><line x1="4" y1="7" x2="20" y2="7" /><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="17" x2="20" y2="17" /></Fragment>,
                school: <Fragment><path d="m12 3 10 5v11a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8Z" /><path d="m12 3-10 5 10 5 10-5Z" /><path d="M6 21v-7a6 6 0 1 1 12 0v7" /></Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [trainingType, setTrainingType] = useState('single'); 
            const [apprentices, setApprentices] = useState(5); 
            const [months, setMonths] = useState(12); 
            const [ojtHours, setOjtHours] = useState(40); 
            const [offjtHours, setOffjtHours] = useState(20); 
            
            const ojtRate = 5000; const offjtRate = 6000; 
            const allowanceRate = 200000; const hrdRate = 250000; const passRate = 150000; 

            const ftTotalAllowanceTable = {
                1: 333000, 2: 416000, 3: 500000, 4: 583000, 5: 667000, 
                6: 750000, 7: 833000, 8: 916000, 9: 1000000, 10: 1083000, 
                11: 1166000, 12: 1250000, 13: 1333000
            };

            const results = useMemo(() => {
                const effectiveApprentices = Math.min(apprentices, 13);
                const monthlyFieldTeacher = ftTotalAllowanceTable[effectiveApprentices]; 
                const monthlyOjt = apprentices * ojtHours * ojtRate;
                const monthlyOffjt = apprentices * offjtHours * offjtRate;
                const monthlyAllowance = apprentices * allowanceRate;
                const monthlyHrd = hrdRate;
                const monthlyTotal = monthlyOjt + monthlyOffjt + monthlyAllowance + monthlyFieldTeacher + monthlyHrd;

                const totalOjt = monthlyOjt * months;
                const totalOffjt = monthlyOffjt * months;
                const totalAllowance = monthlyAllowance * months;
                const totalFieldTeacher = monthlyFieldTeacher * months;
                const totalHrd = monthlyHrd * months;
                const totalPassBonus = apprentices * passRate;
                const grandTotal = totalOjt + totalOffjt + totalAllowance + totalFieldTeacher + totalHrd + totalPassBonus;

                const enterpriseMonthly = trainingType === 'single' ? monthlyTotal : (monthlyTotal - monthlyOffjt);
                const centerMonthly = trainingType === 'single' ? 0 : monthlyOffjt;

                return { monthlyFieldTeacher, isCapped: apprentices >= 13, monthly: { ojt: monthlyOjt, offjt: monthlyOffjt, allowance: monthlyAllowance, fieldTeacher: monthlyFieldTeacher, hrd: monthlyHrd, total: monthlyTotal }, total: { ojt: totalOjt, offjt: totalOffjt, allowance: totalAllowance, fieldTeacher: totalFieldTeacher, hrd: totalHrd, passBonus: totalPassBonus, total: grandTotal }, split: { enterpriseMonthly, centerMonthly } };
            }, [apprentices, months, ojtHours, offjtHours, trainingType]);

            const formatKRW = (val) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(val);
            const toManWon = (val) => (val / 10000).toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-6 bg-white p-5 md:p-6 rounded-[2rem] shadow-sm border border-slate-100">
                            <div className="flex items-center gap-4">
                                <div className="p-3 md:p-4 bg-indigo-600 rounded-2xl text-white shadow-lg">
                                    <Icon name="calculator" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-black text-slate-800 tracking-tight leading-tight">일학습병행 비용 계산기</h1>
                                    <p className="text-slate-500 text-xs md:text-sm font-semibold italic">유형별 지급 구분 및 1:1 데이터 매칭</p>
                                </div>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-2xl border border-slate-200">
                                <button onClick={() => setTrainingType('single')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 md:px-6 py-2.5 rounded-xl text-xs md:text-sm font-black transition-all ${trainingType === 'single' ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-400'}`}><Icon name="building" size={16} /> 단독기업형</button>
                                <button onClick={() => setTrainingType('joint')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 md:px-6 py-2.5 rounded-xl text-xs md:text-sm font-black transition-all ${trainingType === 'joint' ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-400'}`}><Icon name="school" size={16} /> 공동센터형</button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            <div className="lg:col-span-1 space-y-6">
                                <section className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2"><Icon name="settings" size={16} className="text-indigo-500" /> 조건 설정</h2>
                                    <div className="space-y-8">
                                        <div>
                                            <div className="flex justify-between mb-2"><label className="text-sm font-bold text-slate-700">학습근로자 수</label><span className="text-indigo-600 font-black">{apprentices}명</span></div>
                                            <input type="range" min="1" max="50" step="1" value={apprentices} onChange={(e) => setApprentices(Number(e.target.value))} />
                                        </div>
                                        <div>
                                            <div className="flex justify-between mb-2"><label className="text-sm font-bold text-slate-700">훈련 기간</label><span className="text-indigo-600 font-black">{months}개월</span></div>
                                            <input type="range" min="1" max="36" step="1" value={months} onChange={(e) => setMonths(Number(e.target.value))} />
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-[1.5rem] space-y-4 border border-slate-100">
                                            <div className="flex justify-between items-center text-xs"><span className="font-bold text-slate-500">월 OJT(h)</span><input type="number" value={ojtHours} onChange={(e)=>setOjtHours(Number(e.target.value))} className="w-16 bg-white border border-slate-200 rounded-lg p-1.5 text-right font-black outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                                            <div className="flex justify-between items-center text-xs"><span className="font-bold text-slate-500">월 OFF(h)</span><input type="number" value={offjtHours} onChange={(e)=>setOffjtHours(Number(e.target.value))} className="w-16 bg-white border border-slate-200 rounded-lg p-1.5 text-right font-black outline-none focus:ring-2 focus:ring-indigo-500" /></div>
                                        </div>
                                    </div>
                                </section>
                                <section className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="check" size={16} className="text-green-500" /> 현장교사 수당</h2>
                                    <div className="p-5 bg-indigo-600 rounded-[1.5rem] text-white shadow-lg text-center"><p className="text-[10px] font-bold text-indigo-200 uppercase tracking-widest mb-1">월 확정 지원액</p><p className="text-2xl font-black">{toManWon(results.monthlyFieldTeacher)} <span className="text-sm font-medium">만원</span></p></div>
                                </section>
                            </div>

                            <div className="lg:col-span-3 space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                                    <div className="bg-slate-900 p-6 md:p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                                        <div className="relative z-10"><span className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">{trainingType === 'single' ? '기업 월 지원 예상액' : '기업 월 실수령액'}</span><div className="mt-4 md:mt-6"><h3 className="text-3xl md:text-5xl font-black tracking-tight">{formatKRW(results.split.enterpriseMonthly)}</h3><p className="text-slate-400 text-xs mt-3 font-bold flex items-center gap-1"><Icon name="chevron" size={14} /> {trainingType === 'single' ? '모든 훈련비/수당 포함' : 'OFF-JT 센터 지급 제외'}</p></div></div>
                                    </div>
                                    <div className="bg-white p-6 md:p-8 rounded-[2.5rem] border-2 border-slate-50 shadow-sm flex flex-col justify-between">
                                        <div><span className="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-600">Total Project Budget</span><div className="mt-4 md:mt-6"><h3 className="text-3xl md:text-5xl font-black text-slate-800 tracking-tight">{formatKRW(results.total.total)}</h3><div className="flex items-center justify-between mt-4 md:mt-6 p-4 bg-slate-50 rounded-2xl border border-slate-100"><span className="text-xs font-bold text-slate-500 italic">총 과정 지원금 합계</span><Icon name="trending" size={20} className="text-indigo-500" /></div></div></div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="px-6 py-4 border-b border-slate-50 bg-slate-50/50 flex items-center justify-between"><h3 className="text-base font-black text-slate-800">상세 분석</h3>{results.isCapped && <span className="px-3 py-1 bg-amber-100 text-amber-700 text-[10px] rounded-full font-black border border-amber-200">13인 상한</span>}</div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs md:text-sm">
                                            <thead><tr className="font-black text-slate-400 uppercase tracking-widest bg-white border-b border-slate-50"><th className="px-6 py-4">항목</th><th className="px-6 py-4 text-right">월(만원)</th><th className="px-6 py-4 text-right">지급주체</th><th className="px-6 py-4 text-right bg-indigo-50/30 text-indigo-600">총액(원)</th></tr></thead>
                                            <tbody className="divide-y divide-slate-50">
                                                <tr><td className="px-6 py-4 font-black text-slate-700">OJT 훈련비</td><td className="px-6 py-4 text-right font-bold">{toManWon(results.monthly.ojt)}</td><td className="px-6 py-4 text-right text-[10px] text-slate-400">학습기업</td><td className="px-6 py-4 text-right font-black">{formatKRW(results.total.ojt)}</td></tr>
                                                <tr className={trainingType === 'joint' ? 'bg-emerald-50/30' : ''}><td className="px-6 py-4 font-black text-slate-700">OFF-JT 훈련비</td><td className="px-6 py-4 text-right font-bold">{toManWon(results.monthly.offjt)}</td><td className={`px-6 py-4 text-right text-[10px] font-black ${trainingType === 'joint' ? 'text-emerald-600' : 'text-slate-400'}`}>{trainingType === 'single' ? '학습기업' : '공동센터'}</td><td className="px-6 py-4 text-right font-black">{formatKRW(results.total.offjt)}</td></tr>
                                                <tr><td className="px-6 py-4 font-black text-slate-700">훈련장려금</td><td className="px-6 py-4 text-right font-bold">{toManWon(results.monthly.allowance)}</td><td className="px-6 py-4 text-right text-[10px] text-slate-400">근로자</td><td className="px-6 py-4 text-right font-black">{formatKRW(results.total.allowance)}</td></tr>
                                                <tr className="bg-indigo-600 text-white font-black"><td className="px-6 py-4 font-black">현장교사 수당</td><td className="px-6 py-4 text-right text-base">{toManWon(results.monthly.fieldTeacher)}</td><td className="px-6 py-4 text-right text-[10px] opacity-70">학습기업</td><td className="px-6 py-4 text-right bg-indigo-700">{formatKRW(results.total.fieldTeacher)}</td></tr>
                                                <tr><td className="px-6 py-4 font-black text-slate-700">HRD담당자 수당</td><td className="px-6 py-4 text-right font-bold">{toManWon(results.monthly.hrd)}</td><td className="px-6 py-4 text-right text-[10px] text-slate-400">학습기업</td><td className="px-6 py-4 text-right font-black">{formatKRW(results.total.hrd)}</td></tr>
                                                <tr className="bg-slate-50/80"><td className="px-6 py-4 font-black text-slate-700">외부평가 합격수당</td><td className="px-6 py-4 text-right text-slate-300 italic">-</td><td className="px-6 py-4 text-right text-[10px] text-slate-400">학습기업</td><td className="px-6 py-4 text-right font-black text-yellow-600">{formatKRW(results.total.passBonus)}</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-900 rounded-[2rem] text-white flex flex-col md:flex-row items-center gap-6"><Icon name="info" size={24} className="text-indigo-400 shrink-0" /><div className="text-xs text-slate-400 leading-relaxed text-center md:text-left"><strong>유형 안내:</strong> 단독기업형은 모든 지원금이 기업으로, 공동훈련센터형은 OFF-JT 비용이 센터로 직접 지급됩니다. 현장교사 수당은 요청하신 1:1 데이터(1인 33.3~13인 133.3만원)를 기준으로 산출됩니다.</div></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
